<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Branch Saloon</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Georgia,serif;
  background:radial-gradient(circle,#3b2a1d,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:12px;
  color:#f6deb0;
}
.game{
  width:95%;
  max-width:420px;
  padding:16px;
  border-radius:18px;
  background:linear-gradient(#5a3824,#2b170e);
  border:5px solid #1b0d08;
  box-shadow:0 20px 50px rgba(0,0,0,.7);
  text-align:center;
}
h1{
  margin:0 0 10px;
  font-size:2.2rem;
  color:#ffe79a;
  text-shadow:0 3px 0 #1b0d08;
}
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}
.stat,.free-spin-box{
  padding:10px;
  background:#6b3e25;
  border-radius:8px;
  font-weight:bold;
}
.free-spin-box{
  background:#3a2114;
  color:#ffe79a;
  margin-bottom:10px;
}
.machine{
  height:320px;
  padding:10px;
  background:#1a0d07;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}
.slot-screen{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  height:300px;
}
.reel{
  display:grid;
  grid-template-rows:repeat(3,1fr);
  gap:6px;
  height:300px;
  padding:6px;
  background:#2d1b10;
  border-radius:8px;
}
.symbol{
  height:90px;
  overflow:hidden;
  border-radius:8px;
  background:#120907;
}
.slot-img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:8px;
}
.reel.spinning .slot-img{
  animation:reelSpin .1s linear infinite;
}
@keyframes reelSpin{
  from{transform:translateY(-18px) scale(1.05);opacity:.45}
  to{transform:translateY(18px) scale(1.05);opacity:1}
}
.symbol.win{
  box-shadow:0 0 14px gold,0 0 28px orange,inset 0 0 10px gold;
}
.symbol.bonus{
  box-shadow:0 0 16px #72d6ff,0 0 30px #fff,inset 0 0 10px #72d6ff;
}
.bonus-video-wrap{
  position:absolute;
  inset:10px;
  height:300px;
  background:#000;
  border-radius:8px;
  overflow:hidden;
  opacity:0;
  visibility:hidden;
  transition:opacity .6s ease;
}
.bonus-video-wrap.show{
  opacity:1;
  visibility:visible;
}
.bonus-video-wrap video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}
.message{
  margin:10px 0;
  min-height:24px;
  font-weight:bold;
  color:#ffe79a;
}
.controls,.bottom-buttons{
  display:grid;
  gap:6px;
}
.controls{grid-template-columns:repeat(3,1fr)}
.bottom-buttons{
  grid-template-columns:repeat(3,1fr);
  margin-top:6px;
}
button{
  padding:12px;
  border:0;
  border-radius:8px;
  background:#a46c3e;
  color:white;
  font-weight:bold;
}
button:disabled{opacity:.5}
</style>
</head>

<body>

<div class="game">
  <h1>Long Branch Saloon</h1>

  <div class="stats">
    <div class="stat">Balance: $<span id="score">100</span></div>
    <div class="stat">Bet: <span id="bet">10</span></div>
  </div>

  <div class="free-spin-box">Free Games: <span id="freeSpins">0</span></div>

  <div class="machine">
    <div class="slot-screen" id="slotScreen"></div>

    <div class="bonus-video-wrap" id="bonusVideoWrap">
      <video id="bonusVideo" playsinline preload="auto">
        <source src="videos/intro.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="message" id="message">Good luck!</div>

  <div class="controls">
    <button id="betDown">- Bet</button>
    <button id="spin">SPIN</button>
    <button id="betUp">+ Bet</button>
  </div>

  <div class="bottom-buttons">
    <button id="musicToggle">🔊 Music</button>
    <button id="maxBet">Max</button>
    <button id="payInfoBtn">Info</button>
  </div>
</div>

<div id="payModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;padding:20px;">
  <div style="max-width:420px;margin:40px auto;background:#3a2114;color:#ffe79a;border:4px solid #1b0d08;border-radius:16px;padding:18px;font-family:Georgia,serif;">
    <h2>Pay Info</h2>
    <p>Match 3 symbols in a row, column, or diagonal.</p>
    <p>Each winning line pays 3x your bet.</p>
    <p>Dillon winning lines pay 15% extra.</p>
    <p>Land 3 badge symbols anywhere to trigger 10 automatic free games.</p>
    <p>Your bet locks during the bonus.</p>
    <button onclick="document.getElementById('payModal').style.display='none'">Close</button>
  </div>
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="music/ohsusanna.mp3" type="audio/mpeg">
</audio>

<audio id="spinSound" preload="auto">
  <source src="music/playbutton.mp3" type="audio/mpeg">
</audio>

<audio id="winSound" preload="auto">
  <source src="music/winning.mp3" type="audio/mpeg">
</audio>

<script>
const DILLON="images/dillon.png";
const BONUS_SYMBOL="images/badge.png";

const weightedSymbols=[
  "images/dillon.png","images/dillon.png",
  "images/doc.png","images/doc.png",
  "images/kitty.png","images/kitty.png",
  "images/festus.png","images/festus.png",
  "images/chester.png","images/chester.png",
  "images/thad.png","images/thad.png",
  "images/newly.png","images/newly.png",
  "images/badge.png"
];

const slotScreen=document.getElementById("slotScreen");
const bonusVideoWrap=document.getElementById("bonusVideoWrap");
const bonusVideo=document.getElementById("bonusVideo");
const scoreEl=document.getElementById("score");
const betEl=document.getElementById("bet");
const freeSpinsEl=document.getElementById("freeSpins");
const messageEl=document.getElementById("message");
const music=document.getElementById("bgMusic");
const spinSound=document.getElementById("spinSound");
const winSound=document.getElementById("winSound");

let score=100;
let bet=10;
let freeSpins=0;
let lockedBonusBet=null;
let reels=[];
let spinning=false;
let bonusPlaying=false;
let autoFreeSpins=false;
let musicStarted=false;

function startMusic(){
  if(musicStarted) return;
  musicStarted=true;
  music.volume=.4;
  music.play().catch(()=>{});
}
document.addEventListener("click",startMusic,{once:true});
document.addEventListener("touchstart",startMusic,{once:true});

function randomSymbol(){
  return weightedSymbols[Math.floor(Math.random()*weightedSymbols.length)];
}

function setSymbol(el,src){
  el.dataset.symbol=src;
  el.classList.remove("win","bonus");
  el.innerHTML=`<img src="${src}" class="slot-img">`;
}

function buildReels(){
  slotScreen.innerHTML="";
  reels=[];
  for(let c=0;c<3;c++){
    const reel=document.createElement("div");
    reel.className="reel";
    for(let r=0;r<3;r++){
      const cell=document.createElement("div");
      cell.className="symbol";
      setSymbol(cell,randomSymbol());
      reel.appendChild(cell);
    }
    slotScreen.appendChild(reel);
    reels.push(reel);
  }
}

function clearHighlights(){
  document.querySelectorAll(".symbol").forEach(el=>el.classList.remove("win","bonus"));
}

function makeGrid(){
  return Array.from({length:3},()=>Array.from({length:3},()=>randomSymbol()));
}

function forceWin(grid){
  const lines=[
    [[0,0],[0,1],[0,2]],[[1,0],[1,1],[1,2]],[[2,0],[2,1],[2,2]],
    [[0,0],[1,0],[2,0]],[[0,1],[1,1],[2,1]],[[0,2],[1,2],[2,2]],
    [[0,0],[1,1],[2,2]],[[2,0],[1,1],[0,2]]
  ];
  const line=lines[Math.floor(Math.random()*lines.length)];
  let winner=randomSymbol();
  if(winner===BONUS_SYMBOL) winner=DILLON;
  line.forEach(([r,c])=>grid[r][c]=winner);
  return grid;
}

function createSpin(){
  let grid=makeGrid();
  if(Math.random()<.38) grid=forceWin(grid);
  return grid;
}

function getGrid(){
  const grid=[[],[],[]];
  for(let r=0;r<3;r++){
    for(let c=0;c<3;c++){
      grid[r][c]=reels[c].children[r].dataset.symbol;
    }
  }
  return grid;
}

function getWinningLines(grid){
  const lines=[
    [[0,0],[0,1],[0,2]],[[1,0],[1,1],[1,2]],[[2,0],[2,1],[2,2]],
    [[0,0],[1,0],[2,0]],[[0,1],[1,1],[2,1]],[[0,2],[1,2],[2,2]],
    [[0,0],[1,1],[2,2]],[[2,0],[1,1],[0,2]]
  ];
  return lines.filter(line=>{
    const [a,b,c]=line.map(([r,c])=>grid[r][c]);
    return a===b && b===c;
  });
}

function countBadges(grid){
  return grid.flat().filter(x=>x===BONUS_SYMBOL).length;
}

function highlightLine(line){
  line.forEach(([r,c])=>reels[c].children[r].classList.add("win"));
}

function highlightBadges(){
  for(let c=0;c<3;c++){
    for(let r=0;r<3;r++){
      if(reels[c].children[r].dataset.symbol===BONUS_SYMBOL){
        reels[c].children[r].classList.add("bonus");
      }
    }
  }
}

function stopEffects(){
  spinSound.pause();
  spinSound.currentTime=0;
  winSound.pause();
  winSound.currentTime=0;
}

function spin(){
  if(spinning||bonusPlaying||(freeSpins<=0&&score<bet)) return;

  stopEffects();
  spinSound.volume=.6;
  spinSound.currentTime=0;
  spinSound.play().catch(()=>{});

  startMusic();
  clearHighlights();

  spinning=true;

  if(freeSpins>0){
    if(lockedBonusBet!==null) bet=lockedBonusBet;
    freeSpins--;
    messageEl.textContent="Free game spinning...";
  }else{
    score-=bet;
    messageEl.textContent="Spinning...";
  }

  update();

  const finalGrid=createSpin();

  reels.forEach((reel,col)=>{
    reel.classList.add("spinning");

    const interval=setInterval(()=>{
      Array.from(reel.children).forEach(cell=>setSymbol(cell,randomSymbol()));
    },80);

    setTimeout(()=>{
      clearInterval(interval);
      reel.classList.remove("spinning");

      for(let r=0;r<3;r++){
        setSymbol(reel.children[r],finalGrid[r][col]);
      }

      if(col===2) finishSpin();
    },800+col*300);
  });
}

function finishSpin(){
  const grid=getGrid();
  const wins=getWinningLines(grid);
  const badgeCount=countBadges(grid);
  const bonusTriggered=badgeCount>=3 && !autoFreeSpins;

  let totalWin=0;
  let dillonBonus=false;

  wins.forEach(line=>{
    highlightLine(line);
    const winningSymbol=grid[line[0][0]][line[0][1]];
    let payout=bet*3;
    if(winningSymbol===DILLON){
      payout*=1.15;
      dillonBonus=true;
    }
    totalWin+=payout;
  });

  totalWin=Math.round(totalWin);
  if(totalWin>0) score+=totalWin;

  if(bonusTriggered){
    lockedBonusBet=bet;
    highlightBadges();
  }

  if(totalWin>0||bonusTriggered){
    winSound.volume=.75;
    winSound.currentTime=0;
    winSound.play().catch(()=>{});
  }

  if(bonusTriggered){
    messageEl.textContent="Badge bonus triggered!";
    update();
    setTimeout(playBonusVideo,900);
    return;
  }

  if(totalWin>0){
    messageEl.textContent=`WIN ${wins.length} LINE${wins.length>1?"S":""}! +$${totalWin}`+(dillonBonus?" DILLON BONUS!":"");
  }else{
    messageEl.textContent=autoFreeSpins?"Free game complete!":"Try again!";
  }

  spinning=false;

  if(autoFreeSpins&&freeSpins>0){
    update();
    setTimeout(spin,900);
    return;
  }

  if(autoFreeSpins&&freeSpins<=0){
    autoFreeSpins=false;
    lockedBonusBet=null;
    messageEl.textContent="Bonus complete!";
  }

  if(score<5&&freeSpins<=0){
    score=100;
    bet=10;
    messageEl.textContent="Fresh start!";
  }

  update();
}

function playBonusVideo(){
  bonusPlaying=true;
  spinning=true;
  update();

  music.pause();
  messageEl.textContent="Badge bonus! Get ready...";

  slotScreen.style.opacity="0";

  setTimeout(()=>{
    bonusVideoWrap.classList.add("show");
    bonusVideo.currentTime=0;
    bonusVideo.play().catch(finishBonusVideo);
  },500);
}

function finishBonusVideo(){
  if(!bonusPlaying) return;

  bonusVideoWrap.classList.remove("show");

  setTimeout(()=>{
    bonusVideo.pause();
    bonusVideo.currentTime=0;
    slotScreen.style.opacity="1";

    freeSpins+=10;
    autoFreeSpins=true;
    bonusPlaying=false;
    spinning=false;

    music.play().catch(()=>{});

    messageEl.textContent="10 free games awarded!";
    update();

    setTimeout(spin,900);
  },700);
}

bonusVideo.addEventListener("ended",finishBonusVideo);

function update(){
  scoreEl.textContent=score;
  betEl.textContent=bet;
  freeSpinsEl.textContent=freeSpins;

  const betLocked=autoFreeSpins||bonusPlaying||lockedBonusBet!==null;

  document.getElementById("betDown").disabled=spinning||betLocked||bet<=5;
  document.getElementById("betUp").disabled=spinning||betLocked||bet>=score||bet>=500;
  document.getElementById("spin").disabled=spinning||bonusPlaying||(freeSpins<=0&&score<bet);
  document.getElementById("maxBet").disabled=spinning||betLocked;
}

document.getElementById("spin").onclick=spin;

document.getElementById("betUp").onclick=()=>{
  if(!spinning&&!bonusPlaying&&!autoFreeSpins&&lockedBonusBet===null&&bet<score&&bet<500){
    bet+=5;
  }
  update();
};

document.getElementById("betDown").onclick=()=>{
  if(!spinning&&!bonusPlaying&&!autoFreeSpins&&lockedBonusBet===null&&bet>5){
    bet-=5;
  }
  update();
};

document.getElementById("maxBet").onclick=()=>{
  if(!spinning&&!bonusPlaying&&!autoFreeSpins&&lockedBonusBet===null){
    bet=Math.min(score,500);
  }
  update();
};

document.getElementById("musicToggle").onclick=()=>{
  startMusic();
  music.muted=!music.muted;
  document.getElementById("musicToggle").textContent=music.muted?"🔇 Music":"🔊 Music";
};

document.getElementById("payInfoBtn").onclick=()=>{
  document.getElementById("payModal").style.display="block";
};

buildReels();
update();
</script>

</body>
  </html>
