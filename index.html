<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Branch Saloon</title>

<style>
body {
    margin: 0;
    font-family: serif;
    background: radial-gradient(circle, #3b2a1d, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #5a321c;
    padding: 20px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 0 30px black;
    text-align: center;
}

h1 {
    color: #f5e3a1;
}

.info {
    display: flex;
    justify-content: space-between;
}

.box {
    background: #7a4b2b;
    padding: 10px;
    border-radius: 10px;
    width: 45%;
    color: white;
}

.freeGames {
    margin: 10px 0;
    background: #3b1e10;
    padding: 8px;
    border-radius: 10px;
    color: #f5e3a1;
}

/* SLOT GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    background: #2a140a;
    padding: 10px;
    border-radius: 12px;
}

.cell {
    width: 100%;
    height: 90px;
    overflow: hidden;
    border-radius: 10px;
}

.cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BUTTONS */
.controls button {
    width: 30%;
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #a06a3d;
    color: white;
    font-weight: bold;
}

.message {
    color: #f5e3a1;
    margin: 5px;
}

/* VIDEO */
#bonusVideo {
    position: absolute;
    width: 360px;
    height: 360px;
    display: none;
    border-radius: 20px;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="container">

<h1>Long Branch Saloon</h1>

<div class="info">
    <div class="box">Balance: $<span id="balance">100</span></div>
    <div class="box">Bet: <span id="bet">10</span></div>
</div>

<div class="freeGames">
Free Games: <span id="freeGames">0</span>
</div>

<div class="grid" id="grid"></div>

<div class="message" id="message">Good luck!</div>

<div class="controls">
    <button onclick="changeBet(-10)">-</button>
    <button onclick="spin()">SPIN</button>
    <button onclick="changeBet(10)">+</button><br>
    <button onclick="toggleMusic()">Music</button>
    <button onclick="maxBet()">Max</button>
    <button onclick="showInfo()">Info</button>
</div>

</div>

<video id="bonusVideo" src="videos/intro.mp4"></video>

<audio id="bgMusic" loop>
<source src="music/music.mp3">
</audio>

<audio id="spinSound">
<source src="music/spin.mp3">
</audio>

<script>

/* SYMBOLS */
const symbols = [
"images/dillon.png",
"images/doc.png",
"images/kitty.png",
"images/festus.png",
"images/thad.png",
"images/newly.png",
"images/chester.png",
"images/badge.png"
];

let grid = [];
let balance = 100;
let bet = 10;
let freeGames = 0;
let lockedBet = 0;

/* BUILD GRID */
function buildGrid(){
    let g = document.getElementById("grid");
    g.innerHTML = "";

    grid = [];

    for(let i=0;i<9;i++){
        let rand = symbols[Math.floor(Math.random()*symbols.length)];
        grid.push(rand);

        let cell = document.createElement("div");
        cell.className = "cell";

        let img = document.createElement("img");
        img.src = rand;

        cell.appendChild(img);
        g.appendChild(cell);
    }
}

/* SPIN */
function spin(){

    if(freeGames <= 0 && balance < bet) return;

    let spinSound = document.getElementById("spinSound");
    spinSound.volume = 0.25;
    spinSound.currentTime = 0;
    spinSound.play();

    if(freeGames <= 0){
        balance -= bet;
    }

    buildGrid();

    setTimeout(checkWin, 400);
    updateUI();
}

/* CHECK WIN */
function checkWin(){

    let lines = [
        [0,1,2],
        [3,4,5],
        [6,7,8],
        [0,3,6],
        [1,4,7],
        [2,5,8]
    ];

    let badgeCount = grid.filter(x => x.includes("badge")).length;

    if(badgeCount >= 3){
        startBonus();
        return;
    }

    let win = 0;

    lines.forEach(line=>{
        let a = grid[line[0]];
        let b = grid[line[1]];
        let c = grid[line[2]];

        if(a === b && b === c){
            let payout = bet * 2;
            if(a.includes("dillon")) payout *= 1.15;
            win += payout;
        }
    });

    if(win > 0){
        balance += win;
        document.getElementById("message").innerText = "WIN $" + win;
    } else {
        document.getElementById("message").innerText = "Try again!";
    }

    if(freeGames > 0){
        freeGames--;
        if(freeGames > 0){
            setTimeout(spin, 700);
        }
    }

    updateUI();
}

/* BONUS */
function startBonus(){

    let music = document.getElementById("bgMusic");
    music.pause();

    let vid = document.getElementById("bonusVideo");
    vid.style.display = "block";
    vid.play();

    vid.onended = () => {
        vid.style.display = "none";

        freeGames = 10;
        lockedBet = bet;

        music.play();
        spin();
    };
}

/* BET */
function changeBet(amount){
    if(freeGames > 0) return;

    bet += amount;
    if(bet < 10) bet = 10;
    if(bet > 500) bet = 500;

    updateUI();
}

function maxBet(){
    if(freeGames > 0) return;
    bet = 500;
    updateUI();
}

/* MUSIC */
function toggleMusic(){
    let m = document.getElementById("bgMusic");
    m.paused ? m.play() : m.pause();
}

/* INFO */
function showInfo(){
    alert(`
PAYOUTS:
3 in a row = 2x bet
Dillon pays +15%

BONUS:
3 Badge symbols = 10 FREE SPINS
Free spins auto-play
Bet locks during bonus
    `);
}

/* UI */
function updateUI(){
    document.getElementById("balance").innerText = balance;
    document.getElementById("bet").innerText = bet;
    document.getElementById("freeGames").innerText = freeGames;
}

/* INIT */
buildGrid();
updateUI();

</script>

</body>
</html>
