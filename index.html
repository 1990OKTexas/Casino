<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Western Saloon</title>

<style>
body {
  margin:0;
  font-family:Georgia,serif;
  background: radial-gradient(circle, #6b5a45, #000 70%);
  color:#f6deb0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game {
  width:90%;
  max-width:420px;
  background:#3b2417;
  padding:16px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.8);
}

h1 { margin:0 0 10px; }

button {
  padding:12px;
  border:none;
  border-radius:8px;
  background:#8b5a35;
  color:white;
  font-weight:bold;
  margin-top:10px;
}

.reels {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:15px 0;
}

.reel {
  background:#1a0d07;
  padding:10px;
  border-radius:6px;
  display:grid;
  grid-template-rows:repeat(3,1fr);
}

.symbol {
  font-size:2rem;
}
</style>
</head>

<body>

<div class="game">
  <h1>Western Saloon</h1>

  <div class="reels" id="reels"></div>

  <button onclick="spin()">SPIN</button>
  <button onclick="toggleMusic()">🔊 Music</button>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="music/Dusty%20Saloon%20Swing.mp3" type="audio/mpeg">
</audio>

<script>
const symbols = ["💍","7️⃣","🪙","🃏","🎲","💰","⭐"];
const reelsContainer = document.getElementById("reels");
const music = document.getElementById("bgMusic");

let started = false;
let muted = false;

// Build reels
for (let i = 0; i < 3; i++) {
  const reel = document.createElement("div");
  reel.className = "reel";

  for (let j = 0; j < 3; j++) {
    const s = document.createElement("div");
    s.className = "symbol";
    s.textContent = random();
    reel.appendChild(s);
  }

  reelsContainer.appendChild(reel);
}

function random() {
  return symbols[Math.floor(Math.random() * symbols.length)];
}

function spin() {
  document.querySelectorAll(".symbol").forEach(s => {
    s.textContent = random();
  });
}

// MUSIC CONTROL
function startMusic() {
  if (started) return;
  started = true;
  music.volume = 0.4;
  music.play().catch(()=>{});
}

document.addEventListener("click", startMusic);

function toggleMusic() {
  startMusic();
  muted = !muted;
  music.muted = muted;
}
</script>

</body>
</html>
