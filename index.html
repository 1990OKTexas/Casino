<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Branch Saloon</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Georgia, serif;
  background:
    radial-gradient(circle at center, rgba(255,235,190,.18), rgba(0,0,0,.6) 70%),
    linear-gradient(90deg,#6b5d4b,#2f2a24,#8a7356,#211b17,#b5a081,#2a2420);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #f6deb0;
}

.game {
  width: 95%;
  max-width: 420px;
  padding: 16px;
  border-radius: 18px;
  background: linear-gradient(#5a3824, #2b170e);
  border: 5px solid #1b0d08;
  box-shadow: 0 20px 50px rgba(0,0,0,.7);
  text-align: center;
}

h1 { color:#ffe79a; }

.stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.stat {
  padding:10px;
  background:#6b3e25;
  border-radius:8px;
}

.free-spin-box {
  margin:10px 0;
  padding:8px;
  background:#3a2114;
  border-radius:8px;
}

.machine {
  height:320px;
  background:#1a0d07;
  border-radius:10px;
  position:relative;
  overflow:hidden;
}

.slot-screen {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  height:300px;
}

.reel {
  display:grid;
  grid-template-rows:repeat(3,1fr);
  gap:6px;
}

.reel.spinning img {
  animation:spin .12s linear infinite;
}

@keyframes spin {
  from { transform:translateY(-18px); }
  to { transform:translateY(18px); }
}

.symbol {
  height:90px;
  background:#120907;
  border-radius:8px;
}

.symbol img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.bonus-video-wrap {
  position:absolute;
  inset:0;
  display:none;
}

.bonus-video-wrap.show {
  display:block;
}

video {
  width:100%;
  height:100%;
  object-fit:contain;
}

.controls, .bottom-buttons {
  display:grid;
  gap:6px;
}

.controls { grid-template-columns:repeat(3,1fr); }
.bottom-buttons { grid-template-columns:repeat(3,1fr); }

button {
  padding:12px;
  background:#a46c3e;
  border-radius:8px;
  color:white;
}
</style>
</head>

<body>

<div class="game">
<h1>Long Branch Saloon</h1>

<div class="stats">
<div class="stat">Balance: $<span id="score">100</span></div>
<div class="stat">Bet: <span id="bet">10</span></div>
</div>

<div class="free-spin-box">Free Games: <span id="freeSpins">0</span></div>

<div class="machine">
<div class="slot-screen" id="slotScreen"></div>

<div class="bonus-video-wrap" id="videoWrap">
<video id="bonusVideo">
<source src="videos/intro.mp4">
</video>
</div>
</div>

<div id="message">Good luck!</div>

<div class="controls">
<button id="betDown">-</button>
<button id="spin">SPIN</button>
<button id="betUp">+</button>
</div>

<div class="bottom-buttons">
<button id="musicToggle">Music</button>
<button id="maxBet">Max</button>
<button id="payInfoBtn">Info</button>
</div>
</div>

<!-- PAY INFO -->
<div id="payModal" style="display:none;position:fixed;inset:0;background:black;color:#ffe79a;padding:20px;">
<h2>Pay Info</h2>
<p>3 in a line = 3x bet</p>
<p>Dillon = +15%</p>
<p>3 badge symbols = BONUS</p>
<p>Bonus = 10 free spins (auto)</p>
<button onclick="document.getElementById('payModal').style.display='none'">Close</button>
</div>

<audio id="bgMusic" loop><source src="music/ohsusanna.mp3"></audio>
<audio id="spinSound"><source src="music/playbutton.mp3"></audio>
<audio id="winSound"><source src="music/winning.mp3"></audio>

<script>
const symbols=["images/dillon.png","images/doc.png","images/kitty.png","images/festus.png","images/chester.png","images/thad.png","images/newly.png","images/badge.png"];
let score=100,bet=10,freeSpins=0,lockedBet=null;
let reels=[],spinning=false,auto=false;

const slot=document.getElementById("slotScreen");

function rand(){ return symbols[Math.floor(Math.random()*symbols.length)]; }

function build(){
slot.innerHTML="";
reels=[];
for(let i=0;i<3;i++){
let r=document.createElement("div");r.className="reel";
for(let j=0;j<3;j++){
let s=document.createElement("div");s.className="symbol";
s.innerHTML=`<img src="${rand()}">`;
r.appendChild(s);
}
slot.appendChild(r);
reels.push(r);
}
}

function spin(){
if(spinning) return;
spinning=true;

document.getElementById("spinSound").play();

if(freeSpins>0){freeSpins--; bet=lockedBet;}
else {score-=bet;}

reels.forEach(r=>{
r.classList.add("spinning");
setTimeout(()=>r.classList.remove("spinning"),800);
});

setTimeout(finish,900);
}

function finish(){
let badges=0;

reels.forEach(r=>{
[...r.children].forEach(c=>{
let src=rand();
c.innerHTML=`<img src="${src}">`;
if(src.includes("badge")) badges++;
});
});

if(badges>=3){
lockedBet=bet;
triggerBonus();
return;
}

if(Math.random()<.4){
score+=bet*3;
document.getElementById("winSound").play();
document.getElementById("message").innerText="WIN!";
}

update();
spinning=false;

if(auto && freeSpins>0) setTimeout(spin,800);
if(auto && freeSpins===0){ auto=false; lockedBet=null; }
}

function triggerBonus(){
document.getElementById("bgMusic").pause();
document.getElementById("videoWrap").classList.add("show");

let v=document.getElementById("bonusVideo");
v.play();

v.onended=()=>{
document.getElementById("videoWrap").classList.remove("show");
document.getElementById("bgMusic").play();

freeSpins+=10;
auto=true;
spinning=false;
update();

setTimeout(spin,800);
};
}

function update(){
scoreEl.innerText=score;
betEl.innerText=bet;
freeSpinsEl.innerText=freeSpins;
}

document.getElementById("spin").onclick=spin;

document.getElementById("betUp").onclick=()=>{
if(bet<500) bet+=5;
update();
};

document.getElementById("betDown").onclick=()=>{
if(bet>5) bet-=5;
update();
};

document.getElementById("maxBet").onclick=()=>{
bet=Math.min(score,500);
update();
};

document.getElementById("payInfoBtn").onclick=()=>{
document.getElementById("payModal").style.display="block";
};

document.addEventListener("click",()=>{
document.getElementById("bgMusic").play();
},{once:true});

build();
update();
</script>

</body>
</html>
