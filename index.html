<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Branch Saloon</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Georgia, serif;
  background:
    radial-gradient(circle at center, rgba(255,235,190,.18), rgba(0,0,0,.6) 70%),
    linear-gradient(90deg,#6b5d4b,#2f2a24,#8a7356,#211b17,#b5a081,#2a2420);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #f6deb0;
  padding: 12px;
}

.game {
  width: 95%;
  max-width: 420px;
  padding: 16px;
  border-radius: 18px;
  background: linear-gradient(#5a3824, #2b170e);
  border: 5px solid #1b0d08;
  box-shadow: 0 20px 50px rgba(0,0,0,.7);
  text-align: center;
}

h1 {
  margin: 0 0 10px;
  font-size: 2.2rem;
  color: #ffe79a;
  text-shadow: 0 3px 0 #1b0d08;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.stat {
  padding: 10px;
  background: #6b3e25;
  border-radius: 8px;
  font-weight: bold;
}

.free-spin-box {
  margin-bottom: 10px;
  padding: 8px;
  background: #3a2114;
  border-radius: 8px;
  color: #ffe79a;
  font-weight: bold;
}

.machine {
  padding: 10px;
  background: #1a0d07;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.slot-screen {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  height: 300px;
  opacity: 1;
  transition: opacity .7s ease;
}

.slot-screen.hidden {
  opacity: 0;
}

.bonus-video-wrap {
  display: none;
  height: 300px;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  opacity: 0;
  transition: opacity .7s ease;
}

.bonus-video-wrap.show {
  display: block;
  opacity: 1;
}

.bonus-video-wrap.fade-out {
  opacity: 0;
}

.bonus-video-wrap video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.reel {
  display: grid;
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
  height: 300px;
  padding: 6px;
  background: #2d1b10;
  border-radius: 8px;
}

.symbol {
  width: 100%;
  height: 90px;
  overflow: hidden;
  border-radius: 8px;
  background: #120907;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow .25s, transform .25s;
}

.symbol.win {
  box-shadow: 0 0 14px gold, 0 0 28px orange, inset 0 0 10px gold;
  transform: scale(1.04);
}

.symbol.bonus {
  box-shadow: 0 0 16px #72d6ff, 0 0 30px #fff, inset 0 0 10px #72d6ff;
  transform: scale(1.05);
}

.slot-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
}

.message {
  margin: 10px 0;
  min-height: 24px;
  font-weight: bold;
  color: #ffe79a;
}

.controls,
.bottom-buttons {
  display: grid;
  gap: 6px;
}

.controls {
  grid-template-columns: repeat(3, 1fr);
}

.bottom-buttons {
  grid-template-columns: repeat(2, 1fr);
  margin-top: 6px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #a46c3e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:active { transform: translateY(2px); }
button:disabled { opacity: .5; }
</style>
</head>

<body>

<div class="game">
  <h1>Long Branch Saloon</h1>

  <div class="stats">
    <div class="stat">Balance: $<span id="score">100</span></div>
    <div class="stat">Bet: <span id="bet">10</span></div>
  </div>

  <div class="free-spin-box">Free Games: <span id="freeSpins">0</span></div>

  <div class="machine">
    <div class="slot-screen" id="slotScreen"></div>

    <div class="bonus-video-wrap" id="bonusVideoWrap">
      <video id="bonusVideo" playsinline preload="auto">
        <source src="videos/intro.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="message" id="message">Good luck!</div>

  <div class="controls">
    <button id="betDown">- Bet</button>
    <button id="spin">SPIN</button>
    <button id="betUp">+ Bet</button>
  </div>

  <div class="bottom-buttons">
    <button id="musicToggle">🔊 Music</button>
    <button id="maxBet">Max Bet</button>
  </div>
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="music/ohsusanna.mp3" type="audio/mpeg">
</audio>

<audio id="spinSound" preload="auto">
  <source src="music/playbutton.mp3" type="audio/mpeg">
</audio>

<audio id="winSound" preload="auto">
  <source src="music/winning.mp3" type="audio/mpeg">
</audio>

<script>
const DILLON = "images/dillon.png";
const BONUS_SYMBOL = "images/badge.png";

const weightedSymbols = [
  "images/dillon.png", "images/dillon.png",
  "images/doc.png", "images/doc.png",
  "images/kitty.png", "images/kitty.png",
  "images/festus.png", "images/festus.png",
  "images/chester.png", "images/chester.png",
  "images/thad.png", "images/thad.png",
  "images/newly.png", "images/newly.png",
  "images/badge.png"
];

const slotScreen = document.getElementById("slotScreen");
const bonusVideoWrap = document.getElementById("bonusVideoWrap");
const bonusVideo = document.getElementById("bonusVideo");
const scoreEl = document.getElementById("score");
const betEl = document.getElementById("bet");
const freeSpinsEl = document.getElementById("freeSpins");
const messageEl = document.getElementById("message");
const music = document.getElementById("bgMusic");
const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");

let score = 100;
let bet = 10;
let freeSpins = 0;
let reels = [];
let spinning = false;
let bonusPlaying = false;
let musicStarted = false;

function startMusic(){
  if(musicStarted) return;
  musicStarted = true;
  music.volume = 0.4;
  music.play().catch(()=>{});
}

document.addEventListener("click", startMusic, {once:true});

function stopEffectSounds(){
  spinSound.pause();
  spinSound.currentTime = 0;

  winSound.pause();
  winSound.currentTime = 0;
}

function randomSymbol(){
  return weightedSymbols[Math.floor(Math.random() * weightedSymbols.length)];
}

function setSymbol(el, src){
  el.dataset.symbol = src;
  el.classList.remove("win", "bonus");
  el.innerHTML = `<img src="${src}" class="slot-img">`;
}

function buildReels(){
  slotScreen.innerHTML = "";
  reels = [];

  for(let col = 0; col < 3; col++){
    const reel = document.createElement("div");
    reel.className = "reel";

    for(let row = 0; row < 3; row++){
      const symbol = document.createElement("div");
      symbol.className = "symbol";
      setSymbol(symbol, randomSymbol());
      reel.appendChild(symbol);
    }

    slotScreen.appendChild(reel);
    reels.push(reel);
  }
}

function clearHighlights(){
  document.querySelectorAll(".symbol").forEach(el => el.classList.remove("win", "bonus"));
}

function makeGrid(){
  return Array.from({length:3}, () =>
    Array.from({length:3}, () => randomSymbol())
  );
}

function forceWin(grid){
  const lines = [
    [[0,0],[0,1],[0,2]],
    [[1,0],[1,1],[1,2]],
    [[2,0],[2,1],[2,2]],
    [[0,0],[1,0],[2,0]],
    [[0,1],[1,1],[2,1]],
    [[0,2],[1,2],[2,2]],
    [[0,0],[1,1],[2,2]],
    [[2,0],[1,1],[0,2]]
  ];

  const line = lines[Math.floor(Math.random() * lines.length)];
  let winner = randomSymbol();

  if(winner === BONUS_SYMBOL){
    winner = "images/dillon.png";
  }

  line.forEach(([r,c]) => grid[r][c] = winner);
  return grid;
}

function createSpin(){
  let grid = makeGrid();

  if(Math.random() < 0.38){
    grid = forceWin(grid);
  }

  return grid;
}

function getGrid(){
  const grid = [[], [], []];

  for(let r = 0; r < 3; r++){
    for(let c = 0; c < 3; c++){
      grid[r][c] = reels[c].children[r].dataset.symbol;
    }
  }

  return grid;
}

function getWinningLines(grid){
  const lines = [
    [[0,0],[0,1],[0,2]],
    [[1,0],[1,1],[1,2]],
    [[2,0],[2,1],[2,2]],
    [[0,0],[1,0],[2,0]],
    [[0,1],[1,1],[2,1]],
    [[0,2],[1,2],[2,2]],
    [[0,0],[1,1],[2,2]],
    [[2,0],[1,1],[0,2]]
  ];

  return lines.filter(line => {
    const [a,b,c] = line.map(([r,c]) => grid[r][c]);
    return a === b && b === c;
  });
}

function countBadges(grid){
  let count = 0;

  for(let r = 0; r < 3; r++){
    for(let c = 0; c < 3; c++){
      if(grid[r][c] === BONUS_SYMBOL) count++;
    }
  }

  return count;
}

function highlightLine(line){
  line.forEach(([r,c]) => {
    reels[c].children[r].classList.add("win");
  });
}

function highlightBadges(){
  for(let c = 0; c < 3; c++){
    for(let r = 0; r < 3; r++){
      if(reels[c].children[r].dataset.symbol === BONUS_SYMBOL){
        reels[c].children[r].classList.add("bonus");
      }
    }
  }
}

function playBonusVideoThenFreeGames(){
  bonusPlaying = true;
  spinning = true;
  update();

  messageEl.textContent = "Badge bonus! Get ready...";

  slotScreen.classList.add("hidden");

  setTimeout(() => {
    bonusVideoWrap.classList.add("show");
    bonusVideoWrap.classList.remove("fade-out");

    bonusVideo.currentTime = 0;
    bonusVideo.play().catch(() => {
      finishBonusVideo();
    });
  }, 550);
}

function finishBonusVideo(){
  bonusVideoWrap.classList.add("fade-out");

  setTimeout(() => {
    bonusVideo.pause();
    bonusVideo.currentTime = 0;

    bonusVideoWrap.classList.remove("show", "fade-out");
    slotScreen.classList.remove("hidden");

    freeSpins += 10;
    bonusPlaying = false;
    spinning = false;

    messageEl.textContent = "10 free games awarded!";
    update();
  }, 700);
}

bonusVideo.addEventListener("ended", finishBonusVideo);

function spin(){
  if(spinning || bonusPlaying || (freeSpins <= 0 && score < bet)) return;

  stopEffectSounds();

  spinSound.volume = 0.6;
  spinSound.play().catch(()=>{});

  startMusic();
  clearHighlights();

  spinning = true;

  const usingFreeSpin = freeSpins > 0;

  if(usingFreeSpin){
    freeSpins--;
    messageEl.textContent = "Free game spinning...";
  } else {
    score -= bet;
    messageEl.textContent = "Spinning...";
  }

  update();

  const finalGrid = createSpin();

  reels.forEach((reel, col) => {
    const interval = setInterval(() => {
      Array.from(reel.children).forEach(cell => {
        setSymbol(cell, randomSymbol());
      });
    }, 80);

    setTimeout(() => {
      clearInterval(interval);

      for(let row = 0; row < 3; row++){
        setSymbol(reel.children[row], finalGrid[row][col]);
      }

      if(col === 2) finishSpin();
    }, 800 + col * 300);
  });
}

function finishSpin(){
  const grid = getGrid();
  const wins = getWinningLines(grid);
  const badgeCount = countBadges(grid);

  let totalWin = 0;
  let dillonBonus = false;
  let bonusTriggered = false;

  if(wins.length > 0){
    wins.forEach(line => {
      highlightLine(line);

      const winningSymbol = grid[line[0][0]][line[0][1]];
      let payout = bet * 3;

      if(winningSymbol === DILLON){
        payout *= 1.15;
        dillonBonus = true;
      }

      totalWin += payout;
    });

    totalWin = Math.round(totalWin);
    score += totalWin;
  }

  if(badgeCount >= 5){
    bonusTriggered = true;
    highlightBadges();
  }

  if(totalWin > 0 || bonusTriggered){
    winSound.volume = 0.75;
    winSound.currentTime = 0;
    winSound.play().catch(()=>{});
  }

  if(bonusTriggered){
    messageEl.textContent = "Badge bonus triggered!";
    update();

    setTimeout(() => {
      playBonusVideoThenFreeGames();
    }, 900);

    return;
  }

  if(totalWin > 0){
    messageEl.textContent =
      `WIN ${wins.length} LINE${wins.length > 1 ? "S" : ""}! +$${totalWin}` +
      (dillonBonus ? " DILLON BONUS!" : "");
  } else {
    messageEl.textContent = "Try again!";
  }

  if(score < 5 && freeSpins <= 0){
    score = 100;
    bet = 10;
    messageEl.textContent = "Fresh start!";
  }

  spinning = false;
  update();
}

function update(){
  scoreEl.textContent = score;
  betEl.textContent = bet;
  freeSpinsEl.textContent = freeSpins;

  document.getElementById("betDown").disabled = spinning || bonusPlaying || bet <= 5;
  document.getElementById("betUp").disabled = spinning || bonusPlaying || bet >= score;
  document.getElementById("spin").disabled = spinning || bonusPlaying || (freeSpins <= 0 && score < bet);
  document.getElementById("maxBet").disabled = spinning || bonusPlaying;
}

document.getElementById("spin").onclick = spin;

document.getElementById("betUp").onclick = () => {
  if(!spinning && !bonusPlaying && bet < score) bet += 5;
  update();
};

document.getElementById("betDown").onclick = () => {
  if(!spinning && !bonusPlaying && bet > 5) bet -= 5;
  update();
};

document.getElementById("maxBet").onclick = () => {
  if(!spinning && !bonusPlaying) bet = Math.min(score, 50);
  update();
};

document.getElementById("musicToggle").onclick = () => {
  startMusic();
  music.muted = !music.muted;
  document.getElementById("musicToggle").textContent = music.muted ? "🔇 Music" : "🔊 Music";
};

buildReels();
update();
</script>

</body>
  </html>
