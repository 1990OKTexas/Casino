<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Branch Saloon</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Georgia, serif;
  background:
    radial-gradient(circle at center, rgba(255,235,190,.18), rgba(0,0,0,.6) 70%),
    linear-gradient(90deg,#6b5d4b,#2f2a24,#8a7356,#211b17,#b5a081,#2a2420);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #f6deb0;
}

.game {
  width: 95%;
  max-width: 420px;
  padding: 16px;
  border-radius: 18px;
  background: linear-gradient(#5a3824, #2b170e);
  border: 5px solid #1b0d08;
  box-shadow: 0 20px 50px rgba(0,0,0,.7);
  text-align: center;
}

h1 {
  margin: 0 0 10px;
  font-size: 2.2rem;
  color: #ffe79a;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.stat {
  padding: 10px;
  background: #6b3e25;
  border-radius: 8px;
  font-weight: bold;
}

.free-spin-box {
  margin: 10px 0;
  padding: 8px;
  background: #3a2114;
  border-radius: 8px;
}

.machine {
  padding: 10px;
  background: #1a0d07;
  border-radius: 10px;
}

.slot-screen {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  height: 300px;
  transition: opacity .6s;
}

.slot-screen.hidden { opacity: 0; }

.bonus-video-wrap {
  display: none;
  height: 300px;
}

.bonus-video-wrap.show {
  display: block;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.reel {
  display: grid;
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
}

.symbol {
  height: 90px;
  background: #120907;
  border-radius: 8px;
}

.symbol img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.symbol.win {
  box-shadow: 0 0 15px gold;
}

.symbol.bonus {
  box-shadow: 0 0 15px cyan;
}

.message {
  margin: 10px 0;
}

.controls, .bottom-buttons {
  display: grid;
  gap: 6px;
}

.controls { grid-template-columns: repeat(3, 1fr); }
.bottom-buttons { grid-template-columns: repeat(2, 1fr); }

button {
  padding: 12px;
  border-radius: 8px;
  background: #a46c3e;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="game">
  <h1>Long Branch Saloon</h1>

  <div class="stats">
    <div class="stat">Balance: $<span id="score">100</span></div>
    <div class="stat">Bet: <span id="bet">10</span></div>
  </div>

  <div class="free-spin-box">Free Games: <span id="freeSpins">0</span></div>

  <div class="machine">
    <div class="slot-screen" id="slotScreen"></div>

    <div class="bonus-video-wrap" id="bonusVideoWrap">
      <video id="bonusVideo">
        <source src="videos/intro.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="message" id="message">Good luck!</div>

  <div class="controls">
    <button id="betDown">- Bet</button>
    <button id="spin">SPIN</button>
    <button id="betUp">+ Bet</button>
  </div>

  <div class="bottom-buttons">
    <button id="musicToggle">🔊 Music</button>
    <button id="maxBet">Max Bet</button>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="music/ohsusanna.mp3">
</audio>

<audio id="spinSound">
  <source src="music/playbutton.mp3">
</audio>

<audio id="winSound">
  <source src="music/winning.mp3">
</audio>

<script>
const BONUS = "images/badge.png";
const slotScreen = document.getElementById("slotScreen");
const videoWrap = document.getElementById("bonusVideoWrap");
const video = document.getElementById("bonusVideo");

const music = document.getElementById("bgMusic");
const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");

let score = 100;
let bet = 10;
let freeSpins = 0;
let reels = [];
let spinning = false;

const symbols = [
  "images/dillon.png","images/doc.png","images/kitty.png",
  "images/festus.png","images/chester.png","images/thad.png",
  "images/newly.png", BONUS
];

function rand(){ return symbols[Math.floor(Math.random()*symbols.length)]; }

function build(){
  slotScreen.innerHTML="";
  reels=[];
  for(let i=0;i<3;i++){
    let reel=document.createElement("div");
    reel.className="reel";
    for(let j=0;j<3;j++){
      let s=document.createElement("div");
      s.className="symbol";
      s.innerHTML=`<img src="${rand()}">`;
      reel.appendChild(s);
    }
    slotScreen.appendChild(reel);
    reels.push(reel);
  }
}

function getGrid(){
  let g=[[],[],[]];
  reels.forEach((r,c)=>{
    [...r.children].forEach((cell,i)=>{
      g[i][c]=cell.querySelector("img").src;
    });
  });
  return g;
}

function countBadge(grid){
  return grid.flat().filter(s=>s.includes("badge")).length;
}

function spin(){
  if(spinning) return;
  spinning=true;

  spinSound.play();
  if(freeSpins>0) freeSpins--;
  else score-=bet;

  reels.forEach(r=>{
    [...r.children].forEach(cell=>{
      cell.innerHTML=`<img src="${rand()}">`;
    });
  });

  setTimeout(finish,600);
}

function finish(){
  let grid=getGrid();
  let badge=countBadge(grid);

  if(badge>=3){
    triggerBonus();
    return;
  }

  let win=Math.random()<0.4;
  if(win){
    score+=bet*3;
    winSound.play();
    document.getElementById("message").textContent="WIN!";
  } else {
    document.getElementById("message").textContent="Try again!";
  }

  update();
  spinning=false;
}

function triggerBonus(){
  document.getElementById("message").textContent="BONUS!";
  
  music.pause();

  slotScreen.classList.add("hidden");

  setTimeout(()=>{
    videoWrap.classList.add("show");
    video.play();
  },400);
}

video.onended=()=>{
  videoWrap.classList.remove("show");
  slotScreen.classList.remove("hidden");

  freeSpins+=10;
  music.play();

  document.getElementById("message").textContent="10 FREE GAMES!";
  update();
  spinning=false;
};

function update(){
  document.getElementById("score").textContent=score;
  document.getElementById("bet").textContent=bet;
  document.getElementById("freeSpins").textContent=freeSpins;
}

document.getElementById("spin").onclick=spin;

document.getElementById("betUp").onclick=()=>{ bet+=5; update(); };
document.getElementById("betDown").onclick=()=>{ if(bet>5) bet-=5; update(); };
document.getElementById("maxBet").onclick=()=>{ bet=50; update(); };

document.getElementById("musicToggle").onclick=()=>{
  if(music.paused) music.play();
  else music.pause();
};

document.addEventListener("click",()=>{
  music.volume=0.4;
  music.play().catch(()=>{});
},{once:true});

build();
update();
</script>

</body>
</html>
