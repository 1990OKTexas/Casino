<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Branch Saloon</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Georgia,serif;
  background:radial-gradient(circle,#3b2a1d,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:12px;
  color:#f6deb0;
}

.game{
  width:95%;
  max-width:420px;
  padding:16px;
  border-radius:18px;
  background:linear-gradient(#5a3824,#2b170e);
  border:5px solid #1b0d08;
  box-shadow:0 20px 50px rgba(0,0,0,.7);
  text-align:center;
}

h1{
  margin:0 0 10px;
  font-size:2.2rem;
  color:#ffe79a;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.stat,.free-spin-box{
  padding:10px;
  border-radius:8px;
  font-weight:bold;
}

.stat{background:#6b3e25}
.free-spin-box{background:#3a2114;color:#ffe79a;margin-bottom:10px}

.machine{
  height:320px;
  padding:10px;
  background:#1a0d07;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

.slot-screen{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  height:300px;
}

.reel{
  display:grid;
  grid-template-rows:repeat(3,1fr);
  gap:6px;
  padding:6px;
  background:#2d1b10;
  border-radius:8px;
}

.symbol{
  height:90px;
  border-radius:8px;
  overflow:hidden;
  background:#120907;
}

.slot-img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.reel.spinning .slot-img{
  animation:spin .1s linear infinite;
}

@keyframes spin{
  from{transform:translateY(-18px)}
  to{transform:translateY(18px)}
}

.bonus-video-wrap{
  position:absolute;
  inset:10px;
  background:#000;
  border-radius:8px;
  overflow:hidden;
  display:none;
}

.bonus-video-wrap.show{display:block}

video{
  width:100%;
  height:100%;
  object-fit:contain;
}

.message{
  margin:10px 0;
}

.controls,.bottom-buttons{
  display:grid;
  gap:6px;
}

.controls{grid-template-columns:repeat(3,1fr)}
.bottom-buttons{grid-template-columns:repeat(3,1fr)}

button{
  padding:12px;
  border-radius:8px;
  border:none;
  background:#a46c3e;
  color:white;
  font-weight:bold;
}

button:disabled{opacity:.5}
</style>
</head>

<body>

<div class="game">
<h1>Long Branch Saloon</h1>

<div class="stats">
<div class="stat">Balance: $<span id="score">100</span></div>
<div class="stat">Bet: <span id="bet">10</span></div>
</div>

<div class="free-spin-box">Free Games: <span id="freeSpins">0</span></div>

<div class="machine">
<div class="slot-screen" id="slotScreen"></div>

<div class="bonus-video-wrap" id="videoWrap">
<video id="bonusVideo">
<source src="videos/intro.mp4">
</video>
</div>
</div>

<div class="message" id="message">Good luck!</div>

<div class="controls">
<button id="betDown">-</button>
<button id="spin">SPIN</button>
<button id="betUp">+</button>
</div>

<div class="bottom-buttons">
<button id="musicToggle">Music</button>
<button id="maxBet">Max</button>
<button id="infoBtn">Info</button>
</div>

</div>

<audio id="bgMusic" loop>
<source src="music/ohsusanna.mp3">
</audio>

<audio id="spinSound">
<source src="music/playbutton.mp3">
</audio>

<audio id="winSound">
<source src="music/winning.mp3">
</audio>

<script>
const symbols=[
"images/dillon.png","images/doc.png","images/kitty.png",
"images/festus.png","images/chester.png","images/thad.png",
"images/newly.png","images/badge.png"
];

let score=100,bet=10,freeSpins=0,lockedBet=null;
let reels=[],spinning=false,auto=false;

const music=document.getElementById("bgMusic");
const spinSound=document.getElementById("spinSound");
const winSound=document.getElementById("winSound");

function startMusic(){
  music.volume=.4;
  music.muted=false;
  music.play().catch(()=>{});
}

document.getElementById("spin").addEventListener("pointerdown",startMusic);

function build(){
let screen=document.getElementById("slotScreen");
screen.innerHTML="";
reels=[];
for(let i=0;i<3;i++){
let r=document.createElement("div");
r.className="reel";
for(let j=0;j<3;j++){
let c=document.createElement("div");
c.className="symbol";
c.innerHTML=`<img src="${rand()}" class="slot-img">`;
r.appendChild(c);
}
screen.appendChild(r);
reels.push(r);
}
}

function rand(){
return symbols[Math.floor(Math.random()*symbols.length)];
}

function spin(){
if(spinning)return;
spinning=true;

spinSound.volume=.5;
spinSound.currentTime=0;
spinSound.play();

if(freeSpins>0){
freeSpins--;
bet=lockedBet;
}else{
score-=bet;
}

reels.forEach(r=>{
r.classList.add("spinning");
setTimeout(()=>r.classList.remove("spinning"),800);
});

setTimeout(result,900);
update();
}

function result(){
let grid=[];
let badges=0;

reels.forEach(r=>{
[...r.children].forEach(c=>{
let s=rand();
c.innerHTML=`<img src="${s}" class="slot-img">`;
grid.push(s);
if(s.includes("badge"))badges++;
});
});

if(badges>=3){
lockedBet=bet;
bonus();
return;
}

if(Math.random()<.4){
let win=bet*3;
score+=win;
winSound.play();
message.innerText="WIN $"+win;
}else{
message.innerText="Try again";
}

spinning=false;

if(auto&&freeSpins>0)setTimeout(spin,800);
if(auto&&freeSpins==0){auto=false;lockedBet=null;}

update();
}

function bonus(){
music.pause();

let v=document.getElementById("bonusVideo");
let wrap=document.getElementById("videoWrap");

wrap.classList.add("show");
v.play();

v.onended=()=>{
wrap.classList.remove("show");
music.play();

freeSpins=10;
auto=true;
spinning=false;

spin();
};
}

function update(){
scoreEl.innerText=score;
betEl.innerText=bet;
freeSpinsEl.innerText=freeSpins;
}

betUp.onclick=()=>{if(bet<500)bet+=5;update();};
betDown.onclick=()=>{if(bet>5)bet-=5;update();};
maxBet.onclick=()=>{bet=Math.min(score,500);update();};

musicToggle.onclick=()=>{music.paused?music.play():music.pause();};

infoBtn.onclick=()=>{
alert("3 badges = bonus\n10 free spins\nDillon pays 15% more");
};

spin.onclick=spin;

build();
update();
</script>

</body>
</html>
