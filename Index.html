<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friendly Treasure Slots</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }body {
  margin: 0;
  min-height: 100vh;
  font-family: Georgia, "Times New Roman", serif;
  background-color: #4a4033;
  background-image:
    radial-gradient(circle at center, rgba(255, 235, 190, .18), rgba(0, 0, 0, .45) 68%),
    linear-gradient(90deg,
      #6b5d4b 0 7%,
      #2f2a24 7% 8%,
      #8a7356 8% 19%,
      #211b17 19% 20%,
      #b5a081 20% 27%,
      #2a2420 27% 28%,
      #706553 28% 43%,
      #1f1a16 43% 44%,
      #92836c 44% 59%,
      #29231e 59% 60%,
      #5b4f41 60% 73%,
      #1d1814 73% 74%,
      #a89272 74% 86%,
      #26201b 86% 87%,
      #51483d 87% 100%);
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  color: #f6deb0;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    repeating-linear-gradient(90deg, transparent 0 42px, rgba(0,0,0,.28) 42px 46px),
    repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 2px, transparent 2px 9px),
    radial-gradient(circle at 18% 35%, rgba(0,0,0,.35) 0 3px, transparent 4px),
    radial-gradient(circle at 62% 62%, rgba(0,0,0,.28) 0 4px, transparent 5px),
    radial-gradient(circle at 82% 22%, rgba(0,0,0,.32) 0 3px, transparent 4px);
  opacity: .85;
  mix-blend-mode: multiply;
}

.game {
  width: min(100%, 460px);
  padding: 16px;
  border-radius: 18px;
  background: linear-gradient(#5a3824, #2b170e);
  border: 5px solid #1b0d08;
  box-shadow: 0 22px 55px rgba(0,0,0,.75), inset 0 0 0 3px #8b5f39;
  text-align: center;
}

h1 {
  margin: 0 0 12px;
  color: #ffe79a;
  font-size: clamp(2rem, 9vw, 3rem);
  text-shadow: 0 3px 0 #1b0d08;
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.stat, .message, button {
  background: linear-gradient(#865633, #5d351f);
  border: 2px solid #2a130a;
  border-radius: 9px;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,.2);
  color: #fff0bd;
  font-weight: 900;
  text-shadow: 0 2px 0 #1b0d08;
}

.stat { padding: 10px 4px; font-size: 1.05rem; }

.machine {
  padding: 10px;
  background: linear-gradient(90deg, #1a0d07, #6b4428, #1a0d07);
  border: 4px solid #170b06;
  border-radius: 10px;
  box-shadow: inset 0 0 18px rgba(0,0,0,.8);
}

.slot-screen {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  min-height: 220px;
  padding: 8px;
  background: #120907;
  border-radius: 8px;
  box-shadow: inset 0 0 24px rgba(0,0,0,.85);
}

.reel {
  display: grid;
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
  min-height: 204px;
  padding: 6px;
  background: linear-gradient(90deg, #130907, #2d1b10, #130907);
  border-left: 3px solid #6b4428;
  border-right: 3px solid #120907;
  border-radius: 5px;
  overflow: hidden;
}

.symbol {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 58px;
  font-size: clamp(2rem, 11vw, 3.2rem);
  filter: drop-shadow(0 5px 3px rgba(0,0,0,.65));
}

.reel.spinning .symbol { animation: spinBounce .09s linear infinite; }

@keyframes spinBounce {
  from { transform: translateY(-16px) scale(.9); opacity: .5; }
  to { transform: translateY(16px) scale(1.08); opacity: 1; }
}

.message {
  min-height: 44px;
  margin: 12px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1.2fr 1fr;
  gap: 8px;
}

button {
  border: 0;
  padding: 14px 8px;
  font-family: inherit;
  font-size: 1rem;
  cursor: pointer;
}

.spin {
  background: linear-gradient(#a46c3e, #6b3e25);
  font-size: 1.15rem;
}

button:active { transform: translateY(2px); }
button:disabled { opacity: .5; }

.note {
  margin: 12px 0 0;
  font-family: system-ui, sans-serif;
  font-size: .78rem;
  color: #d8bb7b;
}

  </style>
</head>
<body>
  <main class="game">
    <h1>Western Saloon</h1><section class="stats">
  <div class="stat">$<span id="score">100</span></div>
  <div class="stat">Bet: <span id="bet">10</span></div>
</section>

<section class="machine">
  <div class="slot-screen" id="slotScreen"></div>
</section>

<div class="message" id="message">Good luck!</div>

<section class="controls">
  <button id="betDown" type="button">− Bet</button>
  <button id="spin" class="spin" type="button">SPIN</button>
  <button id="betUp" type="button">+ Bet</button>
</section>

<p class="note">Three matching icons on the middle row wins 5×. Two matching icons wins 2×.</p>

  </main>  <script>
    const symbols = ["💍", "7️⃣", "🪙", "🃏", "🎲", "💰", "⭐"];
    const slotScreen = document.getElementById("slotScreen");
    const scoreEl = document.getElementById("score");
    const betEl = document.getElementById("bet");
    const messageEl = document.getElementById("message");
    const spinBtn = document.getElementById("spin");
    const betUpBtn = document.getElementById("betUp");
    const betDownBtn = document.getElementById("betDown");

    let score = 100;
    let bet = 10;
    let spinning = false;
    const reels = [];

    function randomSymbol() {
      return symbols[Math.floor(Math.random() * symbols.length)];
    }

    function buildReels() {
      slotScreen.innerHTML = "";
      reels.length = 0;

      for (let col = 0; col < 3; col++) {
        const reel = document.createElement("div");
        reel.className = "reel";

        for (let row = 0; row < 3; row++) {
          const symbol = document.createElement("div");
          symbol.className = "symbol";
          symbol.textContent = randomSymbol();
          reel.appendChild(symbol);
        }

        slotScreen.appendChild(reel);
        reels.push(reel);
      }
    }

    function updateStats() {
      scoreEl.textContent = score;
      betEl.textContent = bet;
      betDownBtn.disabled = spinning || bet <= 5;
      betUpBtn.disabled = spinning || bet >= score;
      spinBtn.disabled = spinning || score < bet;
    }

    function middleRowResult() {
      return reels.map(reel => reel.children[1].textContent);
    }

    function biggestMatch(row) {
      const counts = {};
      row.forEach(icon => counts[icon] = (counts[icon] || 0) + 1);
      return Math.max(...Object.values(counts));
    }

    betDownBtn.addEventListener("click", () => {
      if (spinning) return;
      bet = Math.max(5, bet - 5);
      updateStats();
    });

    betUpBtn.addEventListener("click", () => {
      if (spinning) return;
      bet = Math.min(score, bet + 5);
      updateStats();
    });

    spinBtn.addEventListener("click", () => {
      if (spinning || score < bet) return;

      spinning = true;
      score -= bet;
      messageEl.textContent = "Spinning...";
      updateStats();

      const timers = reels.map(reel => {
        reel.classList.add("spinning");
        return setInterval(() => {
          Array.from(reel.children).forEach(child => child.textContent = randomSymbol());
        }, 80);
      });

      reels.forEach((reel, index) => {
        setTimeout(() => {
          clearInterval(timers[index]);
          Array.from(reel.children).forEach(child => child.textContent = randomSymbol());
          reel.classList.remove("spinning");

          if (index === reels.length - 1) finishSpin();
        }, 750 + index * 350);
      });
    });

    function finishSpin() {
      const matchCount = biggestMatch(middleRowResult());
      let win = 0;

      if (matchCount === 3) {
        win = bet * 5;
        messageEl.textContent = "Jackpot! +" + win;
      } else if (matchCount === 2) {
        win = bet * 2;
        messageEl.textContent = "Nice win! +" + win;
      } else {
        messageEl.textContent = "Try again!";
      }

      score += win;
      if (score < 5) {
        score = 100;
        bet = 10;
        messageEl.textContent = "Fresh start!";
      }

      spinning = false;
      updateStats();
    }

    buildReels();
    updateStats();
  </script><audio id="bgMusic" loop preload="auto">
<source src="Dusty Saloon Swing.mp3" type="audio/mpeg">

  </audio><button id="musicToggle" style="position:fixed;bottom:20px;right:20px;z-index:999;padding:10px;border-radius:8px;background:#6b4428;color:#fff;">🔊</button>

  <script>
    const music = document.getElementById("bgMusic");
    const toggle = document.getElementById("musicToggle");
    let started = false;
    let muted = false;

    function startMusic() {
      if (started) return;
      started = true;
      music.volume = 0.4;
      music.play().then(()=>{
        console.log("Music started");
      }).catch(err=>{
        console.log("Music blocked:", err);
      });
    }

    document.addEventListener("click", startMusic);
    document.addEventListener("touchstart", startMusic);

    toggle.addEventListener("click", () => {
      if (!started) startMusic();
      muted = !muted;
      music.muted = muted;
      toggle.textContent = muted ? "🔇" : "🔊";
    });
  </script></body>
</html>
